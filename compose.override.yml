name: analytics
services:
  plausible:
    environment:
      SENTRY_DSN: ${SENTRY_DSN}
      ENVIRONMENT: ${ENVIRONMENT:-production}
  plausible_events_db:
    volumes:
      # Add the backups config file
      - ./clickhouse/backups.xml:/etc/clickhouse-server/config.d/backups.xml:ro
      # Add a volume for storing backups
      - ./backups/clickhouse-data:/backups
